# EKP Tier 1 — Eval Set v1 (W44 F4.6 SME-validated, content-based GT)
#
# Validated 2026-06-04 by Chris via the W44 F4.6 interactive review (AI-drafted
# tightened expected_answer_keywords -> human-reviewed per module). GT is
# content-based (keyword-mode), chunker-agnostic by design (W44 R3 deviation:
# acceptable_chunk_ids left empty so the same GT scores both the cap=None and
# cap=8 re-chunks in the F4.7/F4.8 no-regression comparison).
#
# 4 queries (Q048/Q049/Q050/Q054) reclassified to expected_refusal: corpus
# (DRIVE financial-software manuals) genuinely cannot answer them (cross-module
# synthesis / not documented). They are tracked as OOS, excluded from the main
# recall aggregate.
#
# Provenance of the keyword drafts + per-query rationale/flags:
#   docs/01-planning/W44-chunker-image-density-deep-fix/F4.6-gt-proposal.md
# ============================================================================

